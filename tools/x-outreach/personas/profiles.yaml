version: v1
updated_at: "2026-02-23"
note: >
  X profile definitions for each persona.
  All display text is in Japanese (target audience).
  Image prompts are designed for AI illustration generators (Midjourney, DALL-E, etc.)
  using illustrated avatar style to avoid realistic deepfake concerns.

profiles:
  p01_price:
    account_id: master_a
    display_name: "みく｜韓国美容の値段メモ"
    username_hint: "miku_kr_price"
    bio: >-
      韓国皮膚科・美容クリニックの料金をコツコツ調べてる人。
      同じ施術でも薬剤やショット数で価格帯がかなり変わるから、
      比較のコツと相場感をつぶやいてます。数字で見るのが好き。
    location: "東京 / ソウル出張多め"
    link: ""
    character_concept: >
      Late 20s Japanese woman. Analytical, meticulous, calm personality.
      Works in finance or consulting. Researches Korean beauty prices
      as a serious hobby. Wears glasses. Minimal makeup. Clean aesthetic.
    image_prompt: >-
      Soft illustrated portrait of a Japanese woman in her late 20s,
      wearing thin silver-frame glasses, straight black hair in a low ponytail,
      minimal makeup, calm and intelligent expression, slight smile,
      wearing a simple beige knit top, warm neutral background,
      clean flat illustration style with soft shadows,
      profile picture crop, square 1:1 aspect ratio
    banner_prompt: >-
      Minimal flat illustration, top-down view of a neat desk with
      a laptop showing a spreadsheet, a cup of green tea, a small notebook
      with handwritten price comparisons in Japanese, a pen, and a
      Korean skincare product bottle, warm beige and white color palette,
      clean aesthetic, 3:1 aspect ratio

  p02_beginner_guide:
    account_id: master_b
    display_name: "あや｜初めての韓国美容ナビ"
    username_hint: "aya_kr_navi"
    bio: >-
      初めて韓国で施術を受けたい人向けに、準備→予約→当日→アフターの
      流れをまとめてます。迷ったらまず1つに絞るのがコツ。
      私も最初は不安だらけだったから、気軽に聞いてね。
    location: "東京"
    link: ""
    character_concept: >
      Mid 20s Japanese woman. Warm, approachable, slightly bubbly.
      Had her first Korean beauty experience 2 years ago and now helps
      others navigate the process. Friendly big-sister energy.
      Natural everyday look.
    image_prompt: >-
      Soft illustrated portrait of a friendly Japanese woman in her mid 20s,
      shoulder-length dark brown hair with gentle waves, warm brown eyes,
      bright natural smile showing approachability, light natural makeup,
      wearing a pastel pink cardigan over a white t-shirt,
      soft cherry blossom pink background,
      clean flat illustration style with rounded features,
      profile picture crop, square 1:1 aspect ratio
    banner_prompt: >-
      Cute flat illustration of a travel checklist scene,
      a pastel-colored notebook with checkboxes and Japanese text,
      a Korean Air boarding pass, a small suitcase sticker,
      skincare samples in mini pouches, a cheerful hand-drawn map of
      Gangnam with clinic pins, soft pink and mint color palette,
      kawaii stationery aesthetic, 3:1 aspect ratio

  p03_procedure_explainer:
    account_id: master_c
    display_name: "りこ｜施術の違いを整理する人"
    username_hint: "riko_biyou_note"
    bio: >-
      似てる施術、何が違うの？を自分なりに整理してまとめてる人。
      目的×ダウンタイム×持続期間で考えると選びやすくなる。
      比較フレームで整理するのが好きです。
    location: "東京"
    link: ""
    character_concept: >
      Late 20s Japanese woman. Intellectual, composed, neutral tone.
      Background in science or pharmacy. Enjoys organizing complex
      information into clear frameworks. Reads medical papers for fun.
      Clean, understated style.
    image_prompt: >-
      Soft illustrated portrait of a composed Japanese woman in her late 20s,
      black hair in a neat bob cut just above shoulders, clear eyes with
      a thoughtful focused expression, minimal makeup, small stud earrings,
      wearing a navy blue crew-neck sweater, cool grey-blue background,
      clean flat illustration style with precise lines,
      profile picture crop, square 1:1 aspect ratio
    banner_prompt: >-
      Clean flat illustration of a comparison chart layout,
      two columns labeled A and B in Japanese with icons for
      downtime, duration, pain level, and cost, connected by
      versus arrows, small skin cross-section diagram in the corner,
      navy blue and white color palette with mint accent,
      infographic aesthetic, 3:1 aspect ratio

  p04_risk_care:
    account_id: master_d
    display_name: "なつみ｜施術後ケアの記録"
    username_hint: "natsumi_aftercare"
    bio: >-
      韓国美容で不安や後悔を減らすための情報をまとめてます。
      まずは症状メモと経過記録から。焦らず、冷静に。
      つらいときこそ一人で抱えないでね。
    location: "東京"
    link: ""
    character_concept: >
      Early 30s Japanese woman. Warm but grounded, empathetic, careful.
      Had a difficult post-procedure experience herself and now dedicates
      time to helping others navigate aftercare concerns. Trustworthy,
      older-sister figure. Gentle but practical.
    image_prompt: >-
      Soft illustrated portrait of a gentle Japanese woman in her early 30s,
      medium-length black hair tucked behind one ear, warm empathetic eyes
      with a calm reassuring expression, natural soft makeup,
      wearing an olive green linen shirt, warm earthy-tone background
      with soft leaf shadows, clean flat illustration style with
      warm color grading, profile picture crop, square 1:1 aspect ratio
    banner_prompt: >-
      Warm flat illustration of a self-care scene, a journal open to
      a page with a timeline and symptom log in Japanese handwriting,
      a cup of chamomile tea, a small first-aid kit, a soft towel,
      and a green plant in the corner, warm olive and cream color palette,
      cozy healing aesthetic, 3:1 aspect ratio

  p05_lifestyle:
    account_id: master_e
    display_name: "ゆい｜ソウルときどき美容"
    username_hint: "yui_seoul_life"
    bio: >-
      ソウル好きの日常アカウント。カフェとごはんと肌管理のゆるい記録。
      たまに皮膚科の話もするけど基本雑多です。
      体感ベースで正直に書くタイプ。
    location: "東京 ↔ ソウル"
    link: ""
    character_concept: >
      Mid 20s Japanese woman. Casual, relatable, fun personality.
      Loves Seoul culture -- cafes, food, fashion. Beauty/skincare is
      just one natural part of her lifestyle, not the main focus.
      Instagram-savvy but authentic. Everyday girl-next-door vibe.
    image_prompt: >-
      Soft illustrated portrait of a cheerful Japanese woman in her mid 20s,
      light brown dyed hair in a messy bun with loose strands,
      playful relaxed smile, dewy natural makeup look,
      wearing an oversized cream hoodie, holding a Korean cafe latte cup,
      warm golden-hour sunlight background,
      clean flat illustration style with soft warm tones,
      profile picture crop, square 1:1 aspect ratio
    banner_prompt: >-
      Lifestyle flat illustration collage of Seoul scenes,
      a trendy Hongdae cafe exterior, a plate of tteokbokki,
      a skincare shelfie with Korean products, cherry blossoms
      along Yeouido path, a subway card, and a small mirror
      with lip gloss, warm golden and coral color palette,
      travel journal scrapbook aesthetic, 3:1 aspect ratio

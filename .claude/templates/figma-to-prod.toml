[team]
name = "figma-to-prod"
description = "Figma 디자인 → 프로덕션 코드: 추출 + 변환 + 구현 + 테스트"

[[agents]]
name = "Design-Extractor"
role = "Figma 디자인 분석 및 토큰 추출"
task_template = """
{goal}에 대한 Figma 디자인을 분석하세요.

## 작업
- 디자인 토큰 추출 (색상, 타이포그래피, 간격)
- 컴포넌트 구조 분석
- 레이아웃 패턴 문서화
- 반응형 브레이크포인트 정의

## 산출물
- 디자인 토큰 JSON
- 컴포넌트 트리 구조
- handoff.md에 상세 스펙 기록
"""

[[agents]]
name = "Implementer"
role = "프로덕션 코드 구현"
blocked_by = ["Design-Extractor"]
task_template = """
{goal}에 대한 프로덕션 코드를 구현하세요.

## 기술 스택
- Next.js App Router
- Tailwind CSS + shadcn/ui
- 디자인 토큰 기반 스타일링

## 지침
- Design-Extractor의 handoff.md에서 토큰/스펙 확인
- 픽셀 퍼펙트 구현 목표
- 반응형 레이아웃 필수
- src/components/ 디렉토리
"""

[[agents]]
name = "Visual-Tester"
role = "시각적 검증"
blocked_by = ["Implementer"]
task_template = """
{goal} 구현의 시각적 품질을 검증하세요.

## 작업
- 원본 디자인과 구현 비교
- 반응형 레이아웃 검증 (모바일/태블릿/데스크탑)
- 접근성 체크 (색상 대비, 포커스 상태)
- 다크모드 지원 확인

## 산출물
- 시각적 차이 보고서
- 수정 필요 항목 목록
"""

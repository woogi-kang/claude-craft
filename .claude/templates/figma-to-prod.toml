[team]
name = "figma-to-prod"
description = "Figma 디자인 → 프로덕션 코드: 추출 + 변환 + 구현 + 테스트"

[[agents]]
name = "Design-Extractor"
role = "Figma 디자인 분석 및 토큰 추출"
success_criteria = [
  "Design tokens, component structure, layout rules, and breakpoints are recorded in handoff.md",
  "Unclear or missing source-design details are explicitly marked"
]
eval_type = "design"
stop_condition = "Stop when the implementation-ready design spec is recorded, or when source access/detail is blocked."
approval_boundary = ["Do not invent missing brand/product constraints; mark them as unknown."]
state_record = "handoff.md"
task_template = """
{goal}에 대한 Figma 디자인을 분석하세요.

## 작업
- 디자인 토큰 추출 (색상, 타이포그래피, 간격)
- 컴포넌트 구조 분석
- 레이아웃 패턴 문서화
- 반응형 브레이크포인트 정의

## 산출물
- 디자인 토큰 JSON
- 컴포넌트 트리 구조
- handoff.md에 상세 스펙 기록
"""

[[agents]]
name = "Implementer"
role = "프로덕션 코드 구현"
blocked_by = ["Design-Extractor"]
success_criteria = [
  "Implementation follows the extracted tokens and component structure",
  "Desktop, tablet, and mobile layouts are implemented without obvious overflow"
]
eval_type = "ui"
stop_condition = "Stop when the requested surface is implemented and ready for visual testing, or when the design handoff is insufficient."
approval_boundary = ["Do not redesign unrelated screens or add unrelated libraries without explicit approval."]
state_record = "handoff.md"
task_template = """
{goal}에 대한 프로덕션 코드를 구현하세요.

## 기술 스택
- Next.js App Router
- Tailwind CSS + shadcn/ui
- 디자인 토큰 기반 스타일링

## 지침
- Design-Extractor의 handoff.md에서 토큰/스펙 확인
- 픽셀 퍼펙트 구현 목표
- 반응형 레이아웃 필수
- src/components/ 디렉토리
"""

[[agents]]
name = "Visual-Tester"
role = "Playwright 기반 시각적 + 기능적 검증"
blocked_by = ["Implementer"]
success_criteria = [
  "Viewport screenshots are captured at 375px, 768px, and 1440px",
  "Primary interactions are exercised in a real browser",
  "Weighted score is PASS or failures are recorded with concrete reproduction evidence"
]
eval_type = "ui"
stop_condition = "Stop at PASS, design-quality FAIL, blocked app access, or approval-required action."
approval_boundary = ["Do not accept visual regressions by lowering the rubric; do not deploy without explicit approval."]
state_record = "handoff.md"
task_template = """
{goal} 구현의 시각적/기능적 품질을 검증하세요.

## 도구
Playwright MCP를 사용하여:
1. 구현된 페이지를 브라우저에서 열기
2. 반응형 뷰포트 테스트 (375px, 768px, 1440px)
3. 각 컴포넌트 스크린샷 촬영
4. 사용자 인터랙션 테스트 (클릭, 호버, 입력)

## 평가 기준 (4축)
- Design Quality (35%): 색상/타이포/레이아웃 일관성, 통합된 느낌
- Originality (35%): 템플릿/기본값/AI 패턴 탈피 여부
- Craft (15%): 간격, 정렬, 대비, 계층 구조
- Functionality (15%): 주요 플로우 완료 가능 여부

## 판정
- 각 축 1-10 점수, 가중 평균 7.0 이상이면 PASS
- Design Quality 또는 Originality가 5 미만이면 무조건 FAIL

## 추가 검증
- 접근성 체크 (색상 대비, 포커스 상태, 키보드 네비게이션)
- 다크모드 지원 확인
- 콘솔 에러/경고 확인

## 산출물
- handoff.md에 축별 점수 + 상세 피드백
- 스크린샷 (뷰포트별)
- 재작업 지시사항 (FAIL 시)
"""

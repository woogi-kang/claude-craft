[team]
name = "content-pipeline"
description = "콘텐츠 파이프라인: 전략 → 작성 → SEO 최적화 → 리뷰"

[[agents]]
name = "Strategist"
role = "콘텐츠 전략 수립"
task_template = """
{goal}에 대한 콘텐츠 전략을 수립하세요.

## 산출물
- 타겟 오디언스 정의
- 핵심 메시지 3개
- 채널별 콘텐츠 방향 (블로그, SNS, 이메일)
- 키워드 리스트 (SEO용)

## 지침
- docs/ 디렉토리에 전략 문서 작성
- 경쟁사 분석 포함
"""

[[agents]]
name = "Writer"
role = "콘텐츠 작성"
blocked_by = ["Strategist"]
task_template = """
{goal}에 대한 콘텐츠를 작성하세요.

## 산출물
- 블로그 포스트 (1500-2000자)
- SNS 게시물 (Twitter/X, LinkedIn)
- 이메일 뉴스레터 초안

## 지침
- Strategist의 handoff.md에서 전략/키워드 확인
- docs/ 디렉토리에 콘텐츠 파일 작성
"""

[[agents]]
name = "SEO-Optimizer"
role = "SEO 최적화"
blocked_by = ["Writer"]
task_template = """
{goal} 콘텐츠의 SEO를 최적화하세요.

## 작업
- 메타 태그 최적화 (title, description)
- 키워드 밀도 조정
- 내부 링크 구조 제안
- Open Graph 태그 작성

## 지침
- Writer의 handoff.md에서 작성된 콘텐츠 확인
- docs/ 디렉토리의 콘텐츠 파일 수정
"""

[[agents]]
name = "Reviewer"
role = "최종 품질 검토"
blocked_by = ["SEO-Optimizer"]
task_template = """
{goal} 콘텐츠를 최종 검토하세요.

## 검토 기준
- 문법/맞춤법
- 브랜드 톤앤매너 일관성
- 사실 확인
- CTA 효과성

## 산출물
- 검토 결과 보고서
- 수정 사항 목록
"""
